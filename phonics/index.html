<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>英语音标打卡 - Augusta</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans SC", "PingFang SC", "Microsoft YaHei", sans-serif; color: #1a1a1a; background: #fff; line-height: 1.7; font-size: 16px; -webkit-font-smoothing: antialiased; }
a { color: inherit; text-decoration: none; }
a:hover { color: #2563eb; }
.site-header { max-width: 900px; margin: 0 auto; padding: 72px 24px 40px; border-bottom: 1px solid #eee; }
.site-title { font-size: 32px; font-weight: 800; letter-spacing: -1px; }
.site-title a:hover { color: #0066cc; }
.site-desc { color: #888; font-size: 15px; margin-top: 8px; }
.nav { margin-top: 20px; font-size: 14px; display: flex; gap: 20px; }
.nav a { color: #888; }
.nav a:hover { color: #0066cc; }
.nav a.active { color: #1a1a1a; font-weight: 600; }
main { max-width: 900px; margin: 0 auto; padding: 40px 24px 80px; }
.hero { background: linear-gradient(135deg, #f59e0b 0%, #ef4444 100%); color: #fff; padding: 48px 32px; border-radius: 16px; margin-bottom: 40px; text-align: center; }
.hero h1 { font-size: 28px; font-weight: 700; margin-bottom: 8px; }
.hero p { opacity: 0.9; font-size: 15px; }
.section-title { font-size: 20px; font-weight: 700; margin: 32px 0 20px; padding-left: 12px; border-left: 4px solid; }
.section-title.vowel { border-color: #ef4444; }
.section-title.consonant { border-color: #3b82f6; }
.grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 12px; margin-bottom: 16px; }
.day-card { background: #fafafa; border: 1px solid #eee; border-radius: 10px; padding: 16px 12px; text-align: center; transition: all 0.2s; cursor: pointer; }
.day-card:hover { background: #fff; border-color: #2563eb; transform: translateY(-2px); box-shadow: 0 4px 12px rgba(37, 99, 235, 0.08); }
.day-card .day-num { font-size: 11px; color: #aaa; margin-bottom: 4px; font-weight: 600; letter-spacing: 0.5px; }
.day-card .ipa { font-size: 22px; font-weight: 700; color: #1a1a1a; font-family: "Lucida Sans Unicode", "Arial Unicode MS", serif; margin-bottom: 6px; }
.day-card.vowel .ipa { color: #ef4444; }
.day-card.consonant .ipa { color: #3b82f6; }
.day-card .letters { font-size: 11px; color: #888; line-height: 1.4; min-height: 28px; }
.day-card .badge { display: inline-block; margin-top: 6px; font-size: 10px; padding: 1px 6px; border-radius: 8px; background: #fef3c7; color: #b45309; }
.back { margin-bottom: 16px; font-size: 14px; color: #888; }
.back a:hover { color: #0066cc; }
@media (prefers-color-scheme: dark) {
  body { background: #0a0a0a; color: #e0e0e0; }
  .site-header, .site-footer { border-color: #222; }
  .site-desc, .nav a, .back a, .site-footer { color: #666; }
  .nav a.active { color: #e0e0e0; }
  .day-card { background: #111; border-color: #222; }
  .day-card:hover { background: #1a1a1a; border-color: #2563eb; }
  .day-card .day-num { color: #888; }
  .day-card .ipa { color: #e0e0e0; }
  .day-card .letters { color: #888; }
  .day-card.vowel .ipa { color: #f87171; }
  .day-card.consonant .ipa { color: #60a5fa; }
  .hero { background: linear-gradient(135deg, #b45309 0%, #b91c1c 100%); }
}
</style>
</head>
<body>
<header class="site-header">
  <h1 class="site-title"><a href="/">Augusta</a></h1>
  <p class="site-desc">AI 实践者 · 记录与分享 AI 时代的所思所行</p>
  <nav class="nav">
    <a href="/">首页</a>
    <a href="/reports/">晨报</a>
    <a href="/perfume/">香氛研究</a>
    <a href="/phonics/" class="active">英语音标</a>
    <a href="/workbuddy/">WorkBuddy</a>
    <a href="/about.html">关于</a>
  </nav>
</header>

<main>
  <p class="back"><a href="/">← 返回首页</a></p>

  <div class="hero">
    <h1>🎯 48 个国际音标打卡</h1>
    <p>暑期 48 天音标学习计划 · 20 元音 + 28 辅音 · 点击进入每日打卡</p>
  </div>

  <h2 class="section-title vowel">🔴 元音 (Day 1-20)</h2>
  <div class="grid" id="vowel-grid"></div>

  <h2 class="section-title consonant">🔵 辅音 (Day 21-48)</h2>
  <div class="grid" id="consonant-grid"></div>
</main>

<footer class="site-footer" style="text-align:center;padding:40px 24px;border-top:1px solid #eee;color:#aaa;font-size:13px;">
  <p>© 2026 Augusta · <a href="https://github.com/Augusta-waveryu" target="_blank" rel="noopener noreferrer" style="color:#aaa;">GitHub</a> · 音标数据来源 <a href="https://app.smartschool.chat/InterlinkingInterlinking?id=1520" target="_blank" rel="noopener noreferrer" style="color:#aaa;">SmartSchool</a></p>
</footer>

<script src="data/days-base.js"></script>
<script>
(function() {
  var base = window.PHONICS_DAYS_BASE;
  if (!base) return;
  var vowelGrid = document.getElementById('vowel-grid');
  var consonantGrid = document.getElementById('consonant-grid');

  base.days.forEach(function(d) {
    var card = document.createElement('a');
    card.className = 'day-card ' + d.category;
    card.href = 'day.html?d=' + d.day;
    var badge = d.hasDetail ? '<span class="badge">★ 详细发音</span>' : '';
    card.innerHTML = '<div class="day-num">DAY ' + d.day + '</div>' +
                     '<div class="ipa">' + d.ipa + '</div>' +
                     '<div class="letters">' + d.letterGroups + '</div>' +
                     badge;
    if (d.category === 'vowel') vowelGrid.appendChild(card);
    else consonantGrid.appendChild(card);
  });
})();
</script>
</body>
</html>
